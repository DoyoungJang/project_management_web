<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회사 프로젝트 관리</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260325_9" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="topbar">
          <div id="user-info"></div>
          <div class="actions">
            <a class="btn-link" href="/static/template.html">템플릿</a>
            <a class="btn-link" href="/static/settings.html">내 설정</a>
            <a id="admin-link" class="btn-link hidden" href="/static/admin.html">Admin</a>
            <button id="logout-btn" type="button">로그아웃</button>
          </div>
        </div>
        <h1 id="dashboard-hero-title">Company Project Hub</h1>
        <p id="dashboard-hero-subtitle">프로젝트와 작업을 한 화면에서 관리하세요.</p>
      </div>
    </header>

    <main class="layout">
      <section class="cards">
        <article class="card"><h3>전체 프로젝트</h3><p id="stat-projects">0</p></article>
        <article class="card"><h3>진행 중 프로젝트</h3><p id="stat-active">0</p></article>
        <article class="card"><h3>전체 작업</h3><p id="stat-tasks">0</p></article>
        <article class="card"><h3>완료율</h3><p id="stat-rate">0%</p></article>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>내 프로젝트 마감 임박 작업</h2>
          <div id="upcoming-filter" class="segmented">
            <button type="button" class="segmented__btn is-active" data-upcoming-filter="all">
              전체 <span id="upcoming-count-all" class="segmented__count">0</span>
            </button>
            <button type="button" class="segmented__btn" data-upcoming-filter="owner">
              Owner <span id="upcoming-count-owner" class="segmented__count">0</span>
            </button>
            <button type="button" class="segmented__btn" data-upcoming-filter="participant">
              참가자 <span id="upcoming-count-participant" class="segmented__count">0</span>
            </button>
          </div>
        </div>
        <div id="today-notifications" class="list"></div>
      </section>

      <section class="panel gantt-panel">
        <div class="panel__header gantt-panel__header">
          <div>
            <h2>프로젝트 일정 간트 차트</h2>
            <p class="item__meta">작업 시작일과 프로젝트 마감일을 바탕으로 프로젝트 일정을 한눈에 확인합니다.</p>
          </div>
          <div id="project-timeline-legend" class="actions gantt-legend"></div>
        </div>
        <div class="gantt-toolbar">
          <form id="project-timeline-range-form" class="inline-row gantt-controls project-overview-gantt__controls">
            <label class="project-item-editor__field gantt-controls__field">
              <span class="item__meta">시작</span>
              <input id="project-timeline-range-start" name="project_timeline_start" type="date" />
            </label>
            <label class="project-item-editor__field gantt-controls__field">
              <span class="item__meta">종료</span>
              <input id="project-timeline-range-end" name="project_timeline_end" type="date" />
            </label>
            <button id="project-timeline-range-reset" class="project-overview-gantt__reset" type="button">자동 범위</button>
          </form>
          <section class="gantt-filter-panel project-overview-gantt__filter-panel">
            <div class="gantt-filter-panel__header">
              <div>
                <div class="gantt-filter-panel__eyebrow">프로젝트 필터</div>
                <strong>보고 싶은 프로젝트만 선택</strong>
              </div>
              <div class="gantt-filter-panel__controls">
                <label class="gantt-filter-panel__sort">
                  <span class="gantt-filter-panel__sort-label">정렬</span>
                  <select id="project-timeline-sort-select">
                    <option value="timeline">타임라인 순</option>
                    <option value="start_date">시작일 빠른순</option>
                    <option value="end_date">종료일 빠른순</option>
                    <option value="due_date">마감일 빠른순</option>
                    <option value="name">프로젝트명 순</option>
                  </select>
                </label>
                <div class="gantt-filter-panel__buttons">
                  <button id="project-timeline-filter-select-all" class="gantt-filter-panel__action" type="button">전체 선택</button>
                  <button id="project-timeline-filter-clear-all" class="gantt-filter-panel__action" type="button">전체 해제</button>
                </div>
              </div>
            </div>
            <div id="project-timeline-filter-summary" class="item__meta gantt-filter-panel__summary">전체 프로젝트 표시 중</div>
            <div id="project-timeline-filter-list" class="gantt-filter-list"></div>
          </section>
        </div>
        <div class="gantt-surface">
          <div id="project-timeline-empty" class="item gantt-empty hidden">표시할 프로젝트 일정이 없습니다.</div>
          <div id="project-timeline-scroll" class="gantt-scroll hidden">
            <div id="project-timeline" class="project-overview-gantt"></div>
          </div>
        </div>
        <div id="project-timeline-cursor-date" class="gantt-cursor-date hidden" aria-hidden="true"></div>
      </section>

      <section class="panel">
        <h2>프로젝트 등록</h2>
        <form id="project-form" class="form-grid">
          <input name="name" placeholder="프로젝트명" required minlength="2" />
          <input name="owner" placeholder="owner username" required minlength="2" />
          <input name="due_date" type="date" required />
          <select name="status">
            <option value="planned">Planned</option>
            <option value="active">Active</option>
            <option value="done">Done</option>
          </select>
          <textarea name="description" placeholder="설명" required></textarea>
          <button type="submit">프로젝트 추가</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>프로젝트 목록</h2>
        </div>
        <div id="project-list" class="list"></div>
      </section>
    </main>

    <script src="/static/common.js?v=20260321_15"></script>
    <script src="/static/app.js?v=20260325_9"></script>
  </body>
</html>
