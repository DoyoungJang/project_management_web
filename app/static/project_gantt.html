<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로젝트 간트 차트</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="topbar">
          <div class="actions">
            <a class="btn-link" href="/">프로젝트 목록</a>
            <a id="project-board-link" class="btn-link" href="#">작업 보드</a>
            <a id="project-settings-link" class="btn-link" href="#">프로젝트 설정</a>
          </div>
          <div class="actions">
            <a class="btn-link" href="/static/settings.html">내 설정</a>
            <a id="admin-link" class="btn-link hidden" href="/static/admin.html">Admin</a>
            <button id="logout-btn" type="button">로그아웃</button>
          </div>
        </div>
        <h1 id="project-title">프로젝트 간트 차트</h1>
        <p id="project-subtitle">시작일과 목표일 기준으로 프로젝트 일정을 한눈에 확인합니다.</p>
      </div>
    </header>

    <main class="layout">
      <section class="cards">
        <article class="card">
          <h3>프로젝트 마감일</h3>
          <p id="gantt-project-due">-</p>
        </article>
        <article class="card">
          <h3>범위 표시 작업</h3>
          <p id="gantt-scheduled-count">0</p>
        </article>
        <article class="card">
          <h3>범위 미표시 작업</h3>
          <p id="gantt-unscheduled-count">0</p>
        </article>
        <article class="card">
          <h3>타임라인 범위</h3>
          <p id="gantt-range-label">-</p>
        </article>
      </section>

      <section class="panel">
        <div class="panel__header gantt-panel__header">
          <div>
            <h2>프로젝트 간트 차트</h2>
            <p class="item__meta">각 작업의 시작일과 목표일을 기준으로 일정 범위를 표시합니다.</p>
          </div>
          <div id="gantt-legend" class="actions gantt-legend"></div>
        </div>
        <form id="gantt-range-form" class="inline-row gantt-controls">
          <label class="project-item-editor__field gantt-controls__field">
            <span class="item__meta">시작</span>
            <input id="gantt-range-start" name="timeline_start" type="date" />
          </label>
          <label class="project-item-editor__field gantt-controls__field">
            <span class="item__meta">종료</span>
            <input id="gantt-range-end" name="timeline_end" type="date" />
          </label>
          <button id="gantt-range-apply" type="button">범위 적용</button>
          <button id="gantt-range-reset" type="button">자동 범위</button>
        </form>
        <div id="gantt-empty" class="item hidden">표시할 일정이 없습니다.</div>
        <div id="gantt-scroll" class="gantt-scroll hidden"></div>
      </section>

      <section class="panel">
        <h2>범위 미표시 작업</h2>
        <div id="gantt-unscheduled-list" class="list"></div>
      </section>
    </main>

    <script>
      (() => {
        const pageParams = new URLSearchParams(window.location.search);
        const projectId = pageParams.get("project_id");
        const form = document.getElementById("gantt-range-form");
        const startInput = document.getElementById("gantt-range-start");
        const endInput = document.getElementById("gantt-range-end");
        const applyBtn = document.getElementById("gantt-range-apply");
        const resetBtn = document.getElementById("gantt-range-reset");

        if (startInput && pageParams.get("timeline_start")) startInput.value = pageParams.get("timeline_start");
        if (endInput && pageParams.get("timeline_end")) endInput.value = pageParams.get("timeline_end");

        function buildUrl(withRange) {
          const nextParams = new URLSearchParams();
          if (projectId) nextParams.set("project_id", projectId);
          if (withRange) {
            if (startInput?.value) nextParams.set("timeline_start", startInput.value);
            if (endInput?.value) nextParams.set("timeline_end", endInput.value);
          }
          return `/static/project_gantt.html?${nextParams.toString()}`;
        }

        function applyRange() {
          const start = String(startInput?.value || "");
          const end = String(endInput?.value || "");
          if (!start || !end) {
            alert("시작일과 종료일을 모두 입력해 주세요.");
            return;
          }
          if (start > end) {
            alert("시작일은 종료일보다 늦을 수 없습니다.");
            return;
          }
          window.location.href = buildUrl(true);
        }

        form?.addEventListener("submit", (e) => {
          e.preventDefault();
          applyRange();
        });

        applyBtn?.addEventListener("click", applyRange);
        resetBtn?.addEventListener("click", () => {
          window.location.href = buildUrl(false);
        });
      })();
    </script>
    <script src="/static/common.js?v=20260319_3"></script>
    <script src="/static/project_gantt.js?v=20260319_16"></script>
  </body>
</html>
