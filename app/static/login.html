<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260330_2" />
  </head>
  <body>
    <main class="auth-wrap">
      <section class="auth-card">
        <h1>프로젝트 관리 로그인</h1>
        <p>사내 계정으로 로그인하거나 신규 계정을 생성하세요.</p>

        <form id="login-form" class="auth-form">
          <input name="username" placeholder="아이디" required minlength="2" />
          <input name="password" type="password" placeholder="비밀번호" required minlength="6" />
          <button type="submit">로그인</button>
        </form>

        <div class="divider">또는</div>

        <form id="register-form" class="auth-form">
          <input name="username" placeholder="가입 아이디" required minlength="2" maxlength="40" pattern="^[a-zA-Z0-9._-]+$" />
          <input name="display_name" placeholder="이름" required minlength="2" maxlength="60" />
          <input name="signup_code" type="password" placeholder="가입 코드" required minlength="4" maxlength="128" />
          <input name="password" type="password" placeholder="비밀번호" required minlength="6" />
          <input name="confirm_password" type="password" placeholder="비밀번호 확인" required minlength="6" />
          <button type="submit">회원가입</button>
        </form>

        <div class="auth-note">초기 관리자 계정은 서버의 <code>BOOTSTRAP_ADMIN_*</code> 환경변수로 설정됩니다.</div>
      </section>
    </main>
    <script src="/static/common.js?v=20260321_15"></script>
    <script src="/static/login.js?v=20260317_1"></script>
  </body>
</html>
