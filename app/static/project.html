<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>작업 보드</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="topbar">
          <div class="actions">
            <a class="btn-link" href="/">프로젝트 목록</a>
          </div>
          <div class="actions">
            <a id="admin-link" class="btn-link hidden" href="/static/admin.html">Admin</a>
            <button id="logout-btn" type="button">로그아웃</button>
          </div>
        </div>
        <h1 id="project-title">작업 보드</h1>
        <p>Drag & Drop으로 상태를 변경합니다. 프로젝트 정보 수정은 프로젝트 설정에서 진행하세요.</p>
        <div class="settings-callout">
          <div>
            <strong>프로젝트 내용 변경이 필요하면?</strong>
            <div>Owner, 참가자, 템플릿, 알림, 작업 편집은 설정 페이지에서 관리합니다.</div>
          </div>
          <a id="project-settings-link" class="btn-link btn-link--settings" href="#">프로젝트 설정 열기</a>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>작업 보드 (Drag & Drop)</h2>
        <div id="kanban-board" class="kanban-board">
          <div class="kanban-col" data-status="upcoming">
            <h3>Upcoming</h3>
            <div class="kanban-drop" data-drop-zone="upcoming"></div>
          </div>
          <div class="kanban-col" data-status="inprogress">
            <h3>In Progress</h3>
            <div class="kanban-drop" data-drop-zone="inprogress"></div>
          </div>
          <div class="kanban-col" data-status="done">
            <h3>Done</h3>
            <div class="kanban-drop" data-drop-zone="done"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/common.js?v=20260301_2"></script>
    <script src="/static/project_board.js?v=20260301_1"></script>
  </body>
</html>
