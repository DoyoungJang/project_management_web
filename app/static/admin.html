<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 페이지</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="topbar">
          <a class="btn-link" href="/">대시보드로 돌아가기</a>
          <button id="logout-btn" type="button">로그아웃</button>
        </div>
        <h1>Admin - 사용자 및 프로젝트 관리</h1>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>대시보드 문구 설정</h2>
        <p class="item__meta">메인 페이지 상단 제목과 설명을 변경합니다.</p>
        <form id="site-branding-form" class="form-grid">
          <input id="dashboard-title-input" name="dashboard_title" placeholder="상단 제목" minlength="2" maxlength="120" required />
          <input
            id="dashboard-subtitle-input"
            name="dashboard_subtitle"
            placeholder="상단 설명"
            minlength="2"
            maxlength="300"
            required
          />
          <button type="submit">문구 저장</button>
        </form>
      </section>

      <section class="panel">
        <h2>회원가입 코드 설정</h2>
        <p class="item__meta">여기서 저장한 가입 코드를 입력한 사용자만 회원가입할 수 있습니다.</p>
        <div id="signup-code-status" class="item__meta">가입 코드 상태 확인 중...</div>
        <form id="signup-code-form" class="form-grid" style="margin-top: 10px">
          <input
            id="signup-code-input"
            name="signup_code"
            type="password"
            placeholder="새 가입 코드"
            minlength="4"
            maxlength="128"
            required
          />
          <button type="submit">가입 코드 저장</button>
        </form>
      </section>

      <section class="panel">
        <h2>관리자 비밀번호 변경</h2>
        <p class="item__meta">현재 로그인한 관리자 계정의 비밀번호를 변경합니다.</p>
        <form id="admin-password-form" class="form-grid">
          <input
            id="admin-current-password"
            name="current_password"
            type="password"
            placeholder="현재 비밀번호"
            required
          />
          <input
            id="admin-new-password"
            name="new_password"
            type="password"
            placeholder="새 비밀번호 (6자 이상)"
            minlength="6"
            required
          />
          <input
            id="admin-new-password-confirm"
            name="new_password_confirm"
            type="password"
            placeholder="새 비밀번호 확인"
            minlength="6"
            required
          />
          <button type="submit">비밀번호 변경</button>
        </form>
      </section>

      <section class="panel">
        <h2>사용자 생성</h2>
        <form id="create-user-form" class="form-grid">
          <input name="username" placeholder="아이디" required minlength="2" />
          <input name="display_name" placeholder="이름" required minlength="2" />
          <input name="email" type="email" placeholder="email@company.local" required />
          <input name="password" type="password" placeholder="초기 비밀번호" required minlength="6" />
          <label class="inline-check"><input name="is_admin" type="checkbox" /> 관리자</label>
          <button type="submit">사용자 추가</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>사용자 목록</h2>
          <div class="actions">
            <input id="user-filter-input" type="search" placeholder="아이디/이름/이메일 검색" />
            <button id="expand-users-btn" type="button">전체 펼치기</button>
            <button id="collapse-users-btn" type="button">전체 접기</button>
          </div>
        </div>
        <div id="users-list" class="list"></div>
        <div id="users-overflow-controls" class="list-overflow-controls hidden">
          <span id="users-overflow-info" class="item__meta"></span>
          <button id="users-overflow-toggle" type="button"></button>
        </div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>프로젝트 관리</h2>
          <div class="actions">
            <input id="project-filter-input" type="search" placeholder="프로젝트 검색" />
            <button id="expand-projects-btn" type="button">전체 펼치기</button>
            <button id="collapse-projects-btn" type="button">전체 접기</button>
            <button id="reload-projects-btn" type="button">새로고침</button>
          </div>
        </div>
        <div id="projects-list" class="list"></div>
        <div id="projects-overflow-controls" class="list-overflow-controls hidden">
          <span id="projects-overflow-info" class="item__meta"></span>
          <button id="projects-overflow-toggle" type="button"></button>
        </div>
      </section>
    </main>
    <script src="/static/common.js?v=20260321_15"></script>
    <script src="/static/admin.js?v=20260317_2"></script>
  </body>
</html>
